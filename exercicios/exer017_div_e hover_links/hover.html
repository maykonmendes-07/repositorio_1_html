<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exemplo de hover</title>
    <style>
        body{ font-family: Arial, Helvetica, sans-serif;
        }

        div > p {

            display:none;
        }

        div > p {
            display: block;
            color: white;
            background-color: red;
        }


        div:hover{
            color: red;
        }

    </style>
</head>
<body>
    <h1>exemplo de hover</h1>
    <h2>passe o mouse por cima</h2>
    <div>
        passe o mouse aqui
        <P>TEXTO ESCONDIDO.</P>       
    </div> 

    <p>fim do exemplo</p>

</body>
</html>
