    <title>Document</title>
    <style>
        /* SELETORES PERSONALIZADOS
        # = id
        . = class
        : = pseudo-class
        :: = pseudo-element
        > = children
        */
     body{
        font-family: Arial, Helvetica, sans-serif;
     }
     a{
        color: red;
        text-decoration: none;
        font-weight: bold;
     }
     a:visited{
        color: red;
     }
     a:hover{
        color: black;
        text-decoration: underline;
     }
     a:active{
        color: yellow;
     }
     .especial{
        background-color: blue;
     }
     ]


    </style>
</head>
